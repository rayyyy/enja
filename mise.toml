# https://mise.jdx.dev/
# プロジェクトルートで `mise install` → PATH に bun / rust が入ります。

[tools]
bun = "1.3.3"
# Tauri 周辺の推移依存（darling / icu_* / time など）が 1.86〜1.88 を要求するため
rust = "1.88.0"

[tasks]
# 依存関係の取得後に開発サーバー + Tauri を起動
dev = "bun install && bun run tauri dev"
# フロントのみホットリロード（Tauri なし）
"vite-only" = "bun install && bun run dev"
# 本番用フロントビルド + アプリバイナリ
build = "bun install && bun run tauri build"
